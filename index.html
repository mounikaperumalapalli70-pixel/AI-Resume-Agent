<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Creator</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

    <h1>🤖 AI Resume Creator</h1>
    <p>Create an ATS-Friendly Resume using Gemini AI</p>

    <form action="/generate" method="POST">

        <input type="text" name="name" placeholder="Full Name" required>

        <input type="email" name="email" placeholder="Email" required>

        <input type="text" name="phone" placeholder="Phone Number" required>

        <input type="text" name="location" placeholder="Location" required>

        <input type="text" name="linkedin" placeholder="LinkedIn URL">

        <input type="text" name="github" placeholder="GitHub URL">

        <textarea name="education" placeholder="Education" required></textarea>

        <textarea name="skills" placeholder="Skills" required></textarea>

        <textarea name="projects" placeholder="Projects" required></textarea>

        <textarea name="experience" placeholder="Experience" required></textarea>

        <textarea name="certifications" placeholder="Certifications"></textarea>

        <textarea name="languages" placeholder="Languages"></textarea>

        <textarea name="objective" placeholder="Career Objective"></textarea>

        <button type="submit">
            Generate Resume
        </button>

    </form>

</div>

</body>
</html>
